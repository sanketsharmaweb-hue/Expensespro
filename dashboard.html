<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensePro | Premium v6.0 PWA</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #000; --surface: #121212; --primary: #6366f1; --income: #22c55e; --expense: #ef4444; --text-main: #fff; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; min-height: 100vh; }
        
        .page { display: none; padding: 40px 24px; animation: fadeIn 0.4s ease; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { margin-bottom: 25px; }
        .header h1 { font-size: 28px; font-weight: 800; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .balance-card { background: linear-gradient(135deg, #1e1e1e, #111); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 30px; }
        
        .t-item { background: var(--surface); padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .t-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.05); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        
        .action-btns { display: flex; gap: 8px; margin-left: 10px; }
        .action-btns button { background: rgba(255,255,255,0.08); border: none; padding: 8px; border-radius: 10px; cursor: pointer; color: #fff; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--surface); width: 100%; max-width: 500px; padding: 30px; border-radius: 40px 40px 0 0; border: 1px solid rgba(255,255,255,0.1); transform: translateY(100%); transition: 0.3s ease; }
        .modal-overlay.open { display: flex; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        
        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .cat-btn { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; color: var(--text-dim); cursor: pointer; text-align: center; border: 1.5px solid transparent; }
        .cat-btn.selected { background: rgba(99, 102, 241, 0.15); border-color: var(--primary); color: #fff; }

        .type-toggle { display: flex; gap: 10px; margin-bottom: 20px; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 15px; }
        .type-btn { flex: 1; padding: 10px; border: none; border-radius: 10px; cursor: pointer; color: var(--text-dim); font-weight: 700; background: transparent; }
        .type-btn.active-ex { background: var(--expense); color: #fff; }
        .type-btn.active-in { background: var(--income); color: #fff; }

        .setting-card { background: var(--surface); padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        select { background: #000; color: #fff; border: 1px solid var(--primary); padding: 8px; border-radius: 10px; outline: none; }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(18,18,18,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); z-index: 500; }
        .nav-item { color: var(--text-dim); border: none; background: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: var(--primary); }
        .add-btn { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: #fff; font-size: 32px; border: none; transform: translateY(-22px); box-shadow: 0 10px 25px rgba(99,102,241,0.5); }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <header class="header"><p id="greet" style="color:var(--text-dim)">Hello,</p><h1 id="userDisp">User!</h1></header>
        <div class="balance-card"><span>Available Balance</span><h2 id="mainBal">₹0</h2></div>
        <h3>History</h3>
        <div id="transList" style="margin-top: 15px;"></div>
    </div>

    <div id="reports" class="page">
        <header class="header"><h1>Reports</h1></header>
        <div class="balance-card" style="padding: 20px;"><canvas id="statChart"></canvas></div>
        <div class="setting-card"><span>Total Income</span><h4 id="totIn" style="color:var(--income)">₹0</h4></div>
        <div class="setting-card"><span>Total Expense</span><h4 id="totEx" style="color:var(--expense)">₹0</h4></div>
    </div>

    <div id="settings" class="page">
        <header class="header"><h1>Settings</h1></header>
        <div class="setting-card"><span>Currency</span><select id="currSel" onchange="updateCurrency()"><option value="₹">INR (₹)</option><option value="$">USD ($)</option></select></div>
        <button id="installApp" style="display:none; width:100%; padding:18px; border-radius:18px; border:none; background:var(--primary); color:#fff; font-weight:800; margin-top:10px;">Install App Icon</button>
        <button onclick="logout()" style="width:100%; padding:18px; border-radius:18px; border:none; background:rgba(255,255,255,0.05); color:var(--expense); font-weight:800; margin-top:20px;">Logout Account</button>
    </div>

    <div id="profile" class="page">
        <header class="header"><h1>My Profile</h1></header>
        <div style="text-align: center; margin-bottom: 30px;">
            <div id="pfpIcon" style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800;">U</div>
            <h2 id="profileName" style="margin-top: 10px;">User</h2>
            <p id="rankLabel" style="color: var(--primary); font-weight: 700;">BRONZE RANK</p>
        </div>
        <div class="setting-card"><span>Transactions Done</span><h4 id="statCount">0</h4></div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 15px;">New Entry</h2>
            <div class="type-toggle"><button id="exBtn" class="type-btn active-ex" onclick="setType('expense')">Expense</button><button id="inBtn" class="type-btn" onclick="setType('income')">Income</button></div>
            <input type="number" id="amtInp" style="width:100%; background:transparent; border:none; border-bottom:2px solid var(--primary); color:#fff; font-size:40px; text-align:center; outline:none;" placeholder="0">
            <div class="cat-grid" id="catBox">
                <div class="cat-btn selected" onclick="selCat(this, '🍕', 'Food')">🍕<br>Food</div>
                <div class="cat-btn" onclick="selCat(this, '🚗', 'Travel')">🚗<br>Travel</div>
                <div class="cat-btn" onclick="selCat(this, '🛍️', 'Shop')">🛍️<br>Shop</div>
                <div class="cat-btn" onclick="selCat(this, '💡', 'Bills')">💡<br>Bills</div>
            </div>
            <button onclick="save()" style="width:100%; padding:18px; background:var(--primary); border:none; border-radius:18px; color:#fff; font-weight:800; margin-top:10px;">Confirm</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; color:var(--text-dim); margin-top:10px;">Close</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('home', this)">🏠<small>Home</small></button>
        <button class="nav-item" onclick="showPage('reports', this)">📈<small>Stats</small></button>
        <button class="add-btn" onclick="openModal()">+</button>
        <button class="nav-item" onclick="showPage('settings', this)">⚙️<small>Set</small></button>
        <button class="nav-item" onclick="showPage('profile', this)">👤<small>Me</small></button>
    </nav>

    <script>
        // --- PWA LOGIC ---
        let dPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); dPrompt = e; document.getElementById('installApp').style.display = 'block'; });
        document.getElementById('installApp').addEventListener('click', async () => { if (dPrompt) { dPrompt.prompt(); const { outcome } = await dPrompt.userChoice; if (outcome === 'accepted') document.getElementById('installApp').style.display = 'none'; dPrompt = null; } });
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyAuAk4SC_u75__SMqKu50r5bVdga8xcSZY",
            authDomain: "expensespro.firebaseapp.com",
            projectId: "expensespro",
            storageBucket: "expensespro.firebasestorage.app",
            messagingSenderId: "117225436411",
            appId: "1:117225436411:web:db2359d4c642ceec46ac5e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database(), auth = firebase.auth();

        let balance = 0, count = 0, userPath = "", type = 'expense', icon = '🍕', catName = 'Food', editKey = null, currency = '₹', myChart = null;

        auth.onAuthStateChanged((user) => {
            if (user) {
                userPath = 'users/' + user.uid;
                const name = user.displayName || "User";
                document.getElementById('userDisp').innerText = name + "!";
                document.getElementById('profileName').innerText = name;
                document.getElementById('pfpIcon').innerText = name.charAt(0).toUpperCase();
                loadData();
            } else { window.location.href = "index.html"; }
        });

        function loadData() {
            db.ref(userPath).on('value', (snap) => {
                const data = snap.val() || {};
                balance = data.balance || 0; count = data.count || 0; currency = data.currency || '₹';
                document.getElementById('currSel').value = currency;
                document.getElementById('mainBal').innerText = currency + balance.toLocaleString();
                document.getElementById('statCount').innerText = count;
                document.getElementById('rankLabel').innerText = count > 20 ? "GOLD RANK" : count > 10 ? "SILVER RANK" : "BRONZE RANK";
                processReports(data.history);
                renderHistory(data.history);
            });
        }

        function processReports(history) {
            let tin = 0, tex = 0;
            if(history) { Object.values(history).forEach(t => { if(t.type === 'income') tin += t.amt; else tex += t.amt; }); }
            document.getElementById('totIn').innerText = currency + tin.toLocaleString();
            document.getElementById('totEx').innerText = currency + tex.toLocaleString();
            updateChart(tin, tex);
        }

        function updateChart(tin, tex) {
            const ctx = document.getElementById('statChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: { labels: ['Income', 'Expense'], datasets: [{ data: [tin, tex], backgroundColor: ['#22c55e', '#ef4444'], borderWidth: 0 }] },
                options: { cutout: '80%', plugins: { legend: { position: 'bottom', labels: { color: '#fff' } } } }
            });
        }

        function renderHistory(history) {
            const list = document.getElementById('transList'); list.innerHTML = "";
            if(!history) return;
            Object.entries(history).reverse().forEach(([key, t]) => {
                const item = document.createElement('div');
                item.className = 't-item';
                item.innerHTML = `
                    <div style="display:flex; gap:15px; align-items:center;">
                        <div class="t-icon">${t.type==='income'?'💰':t.icon}</div>
                        <div><h4>${t.type==='income'?'Income':t.cat}</h4><small>${t.date}</small></div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <div style="font-weight:800; color:${t.type==='income'?'var(--income)':'var(--expense)'}">${t.type==='income'?'+':'-'}${currency}${t.amt}</div>
                        <div class="action-btns">
                            <button onclick="editEntry('${key}', ${t.amt}, '${t.type}', '${t.cat}', '${t.icon}')">✏️</button>
                            <button onclick="deleteEntry('${key}', ${t.amt}, '${t.type}')">🗑️</button>
                        </div>
                    </div>`;
                list.appendChild(item);
            });
        }

        function save() {
            const amt = parseFloat(document.getElementById('amtInp').value);
            if(!amt) return;
            if(editKey) {
                db.ref(userPath + '/history/' + editKey).once('value', (s) => {
                    const old = s.val();
                    const tempBal = balance + (old.type === 'income' ? -old.amt : old.amt);
                    db.ref(userPath).update({ balance: tempBal + (type === 'income' ? amt : -amt) });
                    db.ref(userPath + '/history/' + editKey).update({ amt, type, cat: catName, icon });
                });
            } else {
                db.ref(userPath).update({ balance: balance + (type === 'income' ? amt : -amt), count: count + 1 });
                db.ref(userPath + '/history').push({ amt, type, cat: catName, icon, date: new Date().toLocaleDateString('en-IN') });
            }
            closeModal();
        }

        function deleteEntry(key, amt, eType) {
            if(!confirm("Delete?")) return;
            db.ref(userPath).update({ balance: balance + (eType === 'income' ? -amt : amt), count: count - 1 });
            db.ref(userPath + '/history/' + key).remove();
        }

        function editEntry(key, amt, t, cat, ic) {
            editKey = key; document.getElementById('modalTitle').innerText = "Edit Entry";
            document.getElementById('amtInp').value = amt; setType(t);
            icon = ic; catName = cat; openModal();
        }

        function updateCurrency() { db.ref(userPath).update({ currency: document.getElementById('currSel').value }); }
        
        function showPage(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            btn.classList.add('active');
        }

        function setType(t) {
            type = t;
            document.getElementById('inBtn').classList.toggle('active-in', t === 'income');
            document.getElementById('exBtn').classList.toggle('active-ex', t === 'expense');
            document.getElementById('catBox').style.display = (t === 'income' ? 'none' : 'grid');
            if(t === 'income') { catName = "Income"; icon = "💰"; }
        }

        function openModal() { document.getElementById('addModal').classList.add('open'); }
        function closeModal() { document.getElementById('addModal').classList.remove('open'); editKey = null; document.getElementById('amtInp').value = ""; }
        function selCat(el, i, n) { document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected')); el.classList.add('selected'); icon = i; catName = n; }
        function logout() { auth.signOut(); }
        const h = new Date().getHours();
        document.getElementById('greet').innerText = h < 12 ? "Good Morning," : h < 17 ? "Good Afternoon," : "Good Evening,";
    </script>
</body>
</html>
