<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpensePro | Premium Cloud v4.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --bg: #000; --surface: #121212; --primary: #6366f1; --income: #22c55e; --expense: #ef4444; --text-main: #fff; --text-dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 110px; min-height: 100vh; }
        
        .page { display: none; padding: 40px 24px; animation: fadeIn 0.4s ease; max-width: 600px; margin: 0 auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 28px; font-weight: 800; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .balance-card { background: linear-gradient(135deg, #1e1e1e, #111); padding: 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 30px; }
        .balance-card h2 { font-size: 36px; margin-top: 10px; }
        
        .t-item { background: var(--surface); padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .t-icon { width: 48px; height: 48px; background: rgba(255,255,255,0.05); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
        
        .action-btns { display: flex; gap: 8px; margin-left: 10px; }
        .action-btns button { background: rgba(255,255,255,0.08); border: none; padding: 8px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .action-btns button:hover { background: rgba(255,255,255,0.15); }

        /* Modal Styling */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); display: none; justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--surface); width: 100%; max-width: 500px; padding: 30px; border-radius: 40px 40px 0 0; border: 1px solid rgba(255,255,255,0.1); transform: translateY(100%); transition: 0.3s ease; }
        .modal-overlay.open { display: flex; }
        .modal-overlay.open .modal-content { transform: translateY(0); }
        
        .type-toggle { display: flex; gap: 10px; margin-bottom: 25px; background: rgba(255,255,255,0.05); padding: 6px; border-radius: 15px; }
        .type-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; color: var(--text-dim); font-weight: 700; background: transparent; }
        .type-btn.active-ex { background: var(--expense); color: #fff; }
        .type-btn.active-in { background: var(--income); color: #fff; }

        .cat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .cat-btn { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 15px; color: var(--text-dim); cursor: pointer; text-align: center; border: 1.5px solid transparent; }
        .cat-btn.selected { background: rgba(99, 102, 241, 0.15); border-color: var(--primary); color: #fff; }

        .amt-input-wrap { margin-bottom: 25px; text-align: center; }
        .amt-input-wrap input { width: 80%; background: transparent; border: none; border-bottom: 2px solid var(--primary); color: #fff; font-size: 42px; text-align: center; outline: none; padding: 10px; }

        .btn-main { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 18px; color: #fff; font-weight: 800; font-size: 16px; cursor: pointer; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 420px; background: rgba(18,18,18,0.95); backdrop-filter: blur(20px); display: flex; justify-content: space-around; padding: 12px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); z-index: 500; }
        .nav-item { color: var(--text-dim); border: none; background: none; display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 20px; }
        .nav-item.active { color: var(--primary); }
        .add-btn { width: 60px; height: 60px; background: var(--primary); border-radius: 50%; color: #fff; font-size: 32px; border: none; transform: translateY(-22px); box-shadow: 0 10px 25px rgba(99,102,241,0.5); cursor: pointer; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <header class="header">
            <div><p id="greet" style="color: var(--text-dim);">Good Day,</p><h1 id="userDispName">User!</h1></div>
            <button onclick="logout()" style="background: none; border: none; font-size: 24px; cursor: pointer;">🚪</button>
        </header>
        
        <div class="balance-card">
            <span style="color: var(--text-dim); font-weight: 600;">Available Balance</span>
            <h2 id="mainBal">₹0</h2>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h3>Transactions</h3>
            <small id="txCount" style="color: var(--primary); font-weight: 700;"></small>
        </div>
        <div id="transList"></div>
    </div>

    <div id="addModal" class="modal-overlay">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-bottom: 20px; text-align: center;">New Entry</h2>
            
            <div class="type-toggle">
                <button id="exBtn" class="type-btn active-ex" onclick="setType('expense')">Expense</button>
                <button id="inBtn" class="type-btn" onclick="setType('income')">Income</button>
            </div>

            <div class="amt-input-wrap">
                <input type="number" id="amtInp" placeholder="0" autofocus>
            </div>
            
            <div id="categoryWrapper">
                <p style="color: var(--text-dim); margin-bottom: 10px; font-size: 14px;">Select Category</p>
                <div class="cat-grid">
                    <div class="cat-btn selected" onclick="selCat(this, '🍕', 'Food')">🍕<br><small>Food</small></div>
                    <div class="cat-btn" onclick="selCat(this, '🚗', 'Travel')">🚗<br><small>Travel</small></div>
                    <div class="cat-btn" onclick="selCat(this, '🛍️', 'Shop')">🛍️<br><small>Shop</small></div>
                    <div class="cat-btn" onclick="selCat(this, '🎬', 'Fun')">🎬<br><small>Fun</small></div>
                    <div class="cat-btn" onclick="selCat(this, '💊', 'Health')">💊<br><small>Health</small></div>
                    <div class="cat-btn" onclick="selCat(this, '💡', 'Bills')">💡<br><small>Bills</small></div>
                </div>
            </div>

            <button class="btn-main" id="saveBtn" onclick="saveData()">Save Transaction</button>
            <button onclick="closeModal()" style="width: 100%; background: none; border: none; color: var(--text-dim); margin-top: 15px; cursor: pointer;">Cancel</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active">🏠<small style="font-size: 10px;">Home</small></button>
        <button class="add-btn" onclick="openModal()">+</button>
        <button class="nav-item" onclick="alert('Profile & Stats coming soon!')">👤<small style="font-size: 10px;">Me</small></button>
    </nav>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyAuAk4SC_u75__SMqKu50r5bVdga8xcSZY",
            authDomain: "expensespro.firebaseapp.com",
            projectId: "expensespro",
            storageBucket: "expensespro.firebasestorage.app",
            messagingSenderId: "117225436411",
            appId: "1:117225436411:web:db2359d4c642ceec46ac5e"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let balance = 0, count = 0, userPath = "", type = 'expense', icon = '🍕', catName = 'Food', editKey = null;

        // --- Auth State ---
        auth.onAuthStateChanged((user) => {
            if (user) {
                userPath = 'users/' + user.uid;
                document.getElementById('userDispName').innerText = (user.displayName || "User") + "!";
                loadAppData();
            } else {
                window.location.href = "index.html";
            }
        });

        // --- Data Loading ---
        function loadAppData() {
            db.ref(userPath).on('value', (snap) => {
                const data = snap.val() || {};
                balance = data.balance || 0;
                count = data.count || 0;
                document.getElementById('mainBal').innerText = "₹" + balance.toLocaleString();
                document.getElementById('txCount').innerText = count + " Total";
                renderTransactions(data.history);
            });
        }

        function renderTransactions(history) {
            const list = document.getElementById('transList');
            list.innerHTML = "";
            if (!history) {
                list.innerHTML = "<p style='text-align:center; color:var(--text-dim); margin-top:20px;'>No data yet. Tap + to add.</p>";
                return;
            }

            Object.entries(history).reverse().forEach(([key, val]) => {
                const div = document.createElement('div');
                div.className = 't-item';
                div.innerHTML = `
                    <div style="display:flex; gap:15px; align-items:center;">
                        <div class="t-icon">${val.type === 'income' ? '💰' : val.icon}</div>
                        <div>
                            <h4 style="font-size:15px;">${val.type === 'income' ? 'Income' : val.cat}</h4>
                            <small style="color:var(--text-dim)">${val.date}</small>
                        </div>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <div style="font-weight:800; font-size:16px; color:${val.type === 'income' ? 'var(--income)' : 'var(--expense)'}">
                            ${val.type === 'income' ? '+' : '-'}₹${val.amt}
                        </div>
                        <div class="action-btns">
                            <button onclick="editEntry('${key}', ${val.amt}, '${val.type}', '${val.cat}', '${val.icon}')">✏️</button>
                            <button onclick="deleteEntry('${key}', ${val.amt}, '${val.type}')">🗑️</button>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
        }

        // --- Save / Edit Logic ---
        function saveData() {
            const amt = parseFloat(document.getElementById('amtInp').value);
            if (!amt || amt <= 0) return alert("Sahi amount dalo bhai!");

            if (editKey) {
                // Pehle purani entry ka asar balance se hatao
                db.ref(userPath + '/history/' + editKey).once('value', (s) => {
                    const old = s.val();
                    const tempBal = balance + (old.type === 'income' ? -old.amt : old.amt);
                    const finalBal = tempBal + (type === 'income' ? amt : -amt);
                    
                    db.ref(userPath).update({ balance: finalBal });
                    db.ref(userPath + '/history/' + editKey).update({
                        amt: amt, type: type, cat: catName, icon: icon
                    });
                    closeModal();
                });
            } else {
                // Fresh Entry
                const newBal = balance + (type === 'income' ? amt : -amt);
                const newTx = {
                    amt: amt,
                    type: type,
                    cat: catName,
                    icon: icon,
                    date: new Date().toLocaleDateString('en-IN', {day:'2-digit', month:'short'})
                };
                db.ref(userPath).update({ balance: newBal, count: count + 1 });
                db.ref(userPath + '/history').push(newTx);
                closeModal();
            }
        }

        // --- Delete Logic ---
        function deleteEntry(key, amt, eType) {
            if (!confirm("Bhai, pakka delete kar doon?")) return;
            const adjust = (eType === 'income') ? -amt : amt;
            db.ref(userPath).update({
                balance: balance + adjust,
                count: count - 1
            });
            db.ref(userPath + '/history/' + key).remove();
        }

        // --- Edit Logic ---
        function editEntry(key, amt, t, cat, ic) {
            editKey = key;
            document.getElementById('modalTitle').innerText = "Edit Transaction";
            document.getElementById('amtInp').value = amt;
            setType(t);
            icon = ic; catName = cat;
            openModal();
        }

        // --- UI Helper Functions ---
        function setType(t) {
            type = t;
            document.getElementById('inBtn').classList.toggle('active-in', t === 'income');
            document.getElementById('exBtn').classList.toggle('active-ex', t === 'expense');
            document.getElementById('categoryWrapper').style.display = (t === 'income' ? 'none' : 'block');
            if (t === 'income') { catName = "Income"; icon = "💰"; }
        }

        function selCat(el, i, n) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
            el.classList.add('selected'); icon = i; catName = n;
        }

        function openModal() { document.getElementById('addModal').classList.add('open'); }
        function closeModal() { 
            document.getElementById('addModal').classList.remove('open'); 
            editKey = null;
            document.getElementById('modalTitle').innerText = "New Entry";
            document.getElementById('amtInp').value = "";
        }

        function logout() { if(confirm("Logout?")) auth.signOut(); }

        // Greet Logic
        const hours = new Date().getHours();
        document.getElementById('greet').innerText = hours < 12 ? "Good Morning," : hours < 17 ? "Good Afternoon," : "Good Evening,";

    </script>
</body>
</html>
